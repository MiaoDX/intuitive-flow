name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install system test tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck tmux

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify skills and tests
        run: bun run verify
