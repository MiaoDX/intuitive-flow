<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340" role="img" aria-labelledby="title desc">
  <title id="title">Intuitive Flow architecture</title>
  <desc id="desc">Human docs define repo truth, agent guidance stays local, primary and specialist skills feed the update pipeline, and update scripts sync Claude Code, Codex, GSD, gstack, community skill sources, and repo-owned skills into user-level surfaces.</desc>
  <defs>
    <style>
      .font { font-family: Aptos, "IBM Plex Sans", "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", "IBM Plex Mono", "SF Mono", Consolas, monospace; }
      .title { font-size: 22px; font-weight: 750; }
      .subtitle { font-size: 12px; font-weight: 600; }
      .section { font-size: 10px; font-weight: 800; letter-spacing: 1.1px; text-transform: uppercase; }
      .label { font-size: 12px; font-weight: 720; }
      .small { font-size: 10.5px; font-weight: 620; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="799" height="339" rx="12" fill="#fbfcfe" stroke="#d8e0ea"/>
  <text x="34" y="38" class="font title" fill="#0f172a">Architecture</text>
  <text x="34" y="59" class="font subtitle" fill="#64748b">Small human truth, local agent guidance, focused skill surface, real installer boundaries</text>

  <g>
    <rect x="34" y="100" width="152" height="118" rx="8" class="panel"/>
    <circle cx="58" cy="124" r="10" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="58" y="128" text-anchor="middle" class="font small" fill="#0f766e">1</text>
    <text x="78" y="128" class="font section" fill="#0f766e">Human truth</text>
    <text x="54" y="158" class="mono small" fill="#0f172a">README.md</text>
    <text x="54" y="178" class="mono small" fill="#0f172a">ARCHITECTURE.md</text>
    <text x="54" y="198" class="mono small" fill="#0f172a">STATUS.md</text>
  </g>

  <path d="M 186 159 H 218" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="218" y="100" width="152" height="118" rx="8" class="panel"/>
    <circle cx="242" cy="124" r="10" fill="#ffedd5" stroke="#fdba74"/>
    <text x="242" y="128" text-anchor="middle" class="font small" fill="#c2410c">2</text>
    <text x="262" y="128" class="font section" fill="#7c2d12">Local agents</text>
    <text x="238" y="163" class="mono small" fill="#0f172a">AGENTS.md</text>
    <text x="238" y="184" class="mono small" fill="#0f172a">CLAUDE.md</text>
    <text x="238" y="204" class="font small" fill="#64748b">project constraints</text>
  </g>

  <path d="M 370 159 H 402" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="402" y="100" width="152" height="118" rx="8" class="panel"/>
    <circle cx="426" cy="124" r="10" fill="#f3e8ff" stroke="#d8b4fe"/>
    <text x="426" y="128" text-anchor="middle" class="font small" fill="#7e22ce">3</text>
    <text x="446" y="128" class="font section" fill="#581c87">Workflows</text>
    <text x="422" y="158" class="mono small" fill="#0f172a">primary skills</text>
    <text x="422" y="178" class="mono small" fill="#0f172a">specialists</text>
    <text x="422" y="198" class="mono small" fill="#0f172a">manifest.txt</text>
  </g>

  <path d="M 554 159 H 586" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="586" y="100" width="180" height="118" rx="8" class="panel"/>
    <circle cx="610" cy="124" r="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="610" y="128" text-anchor="middle" class="font small" fill="#1d4ed8">4</text>
    <text x="630" y="128" class="font section" fill="#1e3a8a">Install pipeline</text>
    <text x="606" y="154" class="mono small" fill="#0f172a">scripts/update.sh</text>
    <text x="606" y="174" class="mono small" fill="#0f172a">Claude + Codex</text>
    <text x="606" y="194" class="mono small" fill="#0f172a">GSD workflow</text>
    <text x="606" y="212" class="mono small" fill="#0f172a">gstack + skills</text>
  </g>

  <path d="M 676 218 V 248" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="90" y="248" width="620" height="52" rx="8" class="panel"/>
  <text x="112" y="270" class="font section" fill="#334155">Installed surfaces outside the repo</text>
  <text x="112" y="291" class="mono small" fill="#0f172a">~/.claude</text>
  <text x="222" y="291" class="mono small" fill="#0f172a">~/.codex</text>
  <text x="326" y="291" class="mono small" fill="#0f172a">~/.agents</text>
  <text x="432" y="291" class="mono small" fill="#0f172a">vendor/gstack</text>

  <rect x="90" y="310" width="620" height="18" rx="6" fill="#f1f5f9" stroke="#d8e0ea"/>
  <text x="400" y="323" text-anchor="middle" class="font small" fill="#475569">Primary: flow, refactor, reduce-entropy, squash. Proof: bun run verify.</text>
</svg>
